# =============================================================================
# Ankole Framework - Configuration
# =============================================================================
# Generic workspace domain. Override via environment variables for flexibility.

# --- Data-driven env var -> config path mapping ---
env_overrides:
  WORKSPACE_WEB_URL: "workspace.web.base_url"
  WORKSPACE_API_URL: "workspace.api.base_url"
  PUSHGATEWAY_URL: "metrics.pushgateway_url"
  LOKI_URL: "remote_logs.loki_url"
  TCMS_API_URL: "kiwi_tcms.url"
  KIWI_PLAN_ID: "kiwi_tcms.plan_id:int"
  KIWI_BUILD_ID: "kiwi_tcms.build_id:int"

# --- Workspace Configuration ---
workspace:
  web:
    base_url: "${WORKSPACE_WEB_URL}"
    browser: "chromium"
    browsers: ["chromium"]
    headless: true
    slow_mo: 0
    timeout: 30000
    viewport:
      width: 1280
      height: 720
    device_emulation:
      enabled: false
      device_name: "iPhone 13"
  api:
    base_url: "${WORKSPACE_API_URL}"
    timeout: 30
  database:
    dsn: "${DATABASE_URL}"
    autorollback: true
  cli:
    command: "ankole-cli"
    api_url: "${WORKSPACE_API_URL}"

# --- Desktop Applications (Windows only, for pywinauto demo) ---
apps:
  calculator:
    path: "calc.exe"
    title: "Calculator"
    startup_wait: 2
    backend: "uia"

# --- Console Tools (cross-platform) ---
console_tools: {}

# --- Evidence Settings ---
evidence:
  base_dir: "evidence"
  screenshots: true
  screenshot_on_failure: true
  screenshot_on_step: true
  log_level: "INFO"

# --- Health Check (pre-execution environment verification) ---
health_check:
  enabled: false
  checks:
    - type: "tcp"
      host: "localhost"
      port: 5000
      timeout: 5
      label: "Workspace Web App"
    - type: "tcp"
      host: "localhost"
      port: 8000
      timeout: 5
      label: "Workspace API"

# --- Kiwi TCMS ---
kiwi_tcms:
  enabled: false
  url: "${TCMS_API_URL}"
  plan_id: "${KIWI_PLAN_ID}"
  build_id: "${KIWI_BUILD_ID}"
  auto_create_run: false

# --- Grafana / Prometheus ---
metrics:
  enabled: false
  pushgateway_url: "${PUSHGATEWAY_URL}"
  job_name: "ankole_e2e"
  metric_prefix: "ankole"
  suite_name: "workspace"
  labels:
    environment: "docker"
    team: "qa"

# --- Security Testing (OWASP ZAP) ---
security:
  zap:
    api_url: "${ZAP_API_URL}"
    api_key: "${ZAP_API_KEY}"
    risk_threshold: "Medium"
  target_url: "${WORKSPACE_API_URL}"

# --- Load Testing ---
load_testing:
  locust:
    users: 10
    spawn_rate: 2
    run_time: "30s"
    target_host: "${WORKSPACE_API_URL}"
  k6:
    vus: 10
    duration: "30s"
    thresholds:
      http_req_duration_p95: 500
      http_req_failed_rate: 0.1
    target_url: "${WORKSPACE_API_URL}"

# --- Remote Logs (Loki) ---
remote_logs:
  enabled: false
  loki_url: "${LOKI_URL}"
  default_limit: 5000
  timeout: 30
  time_buffer: 60
  queries:
    - label: "workspace_web"
      query: '{job="workspace_web"}'
    - label: "workspace_api"
      query: '{job="workspace_api"}'

# --- Visual Regression Testing ---
visual_regression:
  baseline_dir: "baselines"
  actual_dir: "evidence/visual/actual"
  diff_dir: "evidence/visual/diff"
  threshold: 0.01

# --- Accessibility Testing ---
accessibility:
  tags: ["wcag2a", "wcag2aa"]
  disabled_rules: []

# --- Flaky Test Detection ---
flaky_detection:
  enabled: false
  history_path: "evidence/flaky_history.json"
  window_size: 10
  flip_threshold: 2
