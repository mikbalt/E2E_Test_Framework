# =============================================================================
# HSM Test Framework - Configuration
# =============================================================================
# Platform-aware: paths auto-resolve based on OS.
# Override via environment variables for CI/CD flexibility.

# --- Application Under Test (Windows only) ---
apps:
  # E-Admin Application
  e_admin:
    path: "${E_ADMIN_PATH}"             # Required — set in .env
    class_name: "WindowsForms10\\.Window.*"  # WinForms app (empty title)
    startup_wait: 5                # Seconds to wait after launch
    backend: "uia"                 # "uia" (WPF/modern) or "win32" (WinForms/classic)
    app_logs_dir: "${E_ADMIN_APP_LOGS}" # App logs dir — collected + zipped after each test
    compact_logs_dir: 'C:\SPHERE_HSM\Admin Application\AppLogs\Compact'  # Cleared before start to avoid signature popup
    popup_dismiss_buttons: ["OK", "Yes", "Close"]   # Button titles for auto-dismiss
    popup_dismiss_auto_ids: ["2", "btnOKE"]        # Button auto_ids for auto-dismiss
    retry:
      max_attempts: 3                   # Total attempts for popup-retry (default: 2)
      delay: 0.5                        # Seconds between retries
    window_monitor:
      enabled: true                  # Background monitor for unexpected windows
      interval: 1.0                  # Polling interval in seconds
      auto_dismiss: false            # Auto-close unexpected windows (future)
    connection:
      ip: "${HSM_IP}"                # Required — set in .env
      port: "${HSM_PORT}"           # Required — set in .env

  # Example: Windows Calculator (for initial testing/demo)
  calculator:
    path: "calc.exe"
    title: "Calculator"
    startup_wait: 2
    backend: "uia"

# --- Console Tools (cross-platform) ---
# Paths can be overridden per platform.
# Or set env: PKCS11_TOOL_PATH=/usr/bin/pkcs11-tool
console_tools:
  pkcs11_native:
    command_windows: "pkcs11-tool.exe"
    command_linux: "pkcs11-tool"
    working_dir_windows: "C:\\Tools\\pkcs11"
    working_dir_linux: "/opt/tools/pkcs11"
    timeout: 30

  pkcs11_go:
    command_windows: "pkcs11-go-tool.exe"
    command_linux: "./pkcs11-go-tool"
    working_dir_windows: "C:\\Tools\\pkcs11-go"
    working_dir_linux: "/opt/tools/pkcs11-go"
    timeout: 30

  pkcs11_java:
    command: "java"                # Java is cross-platform
    args: ["-jar", "pkcs11-test.jar"]
    working_dir_windows: "C:\\Tools\\pkcs11-java"
    working_dir_linux: "/opt/tools/pkcs11-java"
    timeout: 60

  pkcs11_cpp:
    command_windows: "pkcs11_test.exe"
    command_linux: "./pkcs11_test"
    working_dir_windows: "C:\\Tools\\pkcs11-cpp"
    working_dir_linux: "/opt/tools/pkcs11-cpp"
    timeout: 30

# --- Evidence Settings ---
evidence:
  base_dir: "evidence"
  screenshots: true
  screenshot_on_failure: true
  screenshot_on_step: true
  # video_recording: TODO — not yet implemented
  log_level: "INFO"

# --- Health Check (pre-execution environment verification) ---
# Runs before test collection. Aborts early with clear diagnostics if
# the target environment is not ready. Bypass with --skip-health-check.
health_check:
  enabled: true                    # Pre-execution environment verification
  checks:
    - type: "ping"
      host: "${HSM_IP}"            # Set in .env
      timeout: 5
      label: "HSM Network Reachability"
    - type: "tcp"
      host: "${HSM_IP}"            # Set in .env
      port: "${HSM_PORT}"          # Set in .env
      timeout: 5
      label: "HSM E-Admin Port"

# --- Kiwi TCMS ---
# Bidirectional mode (--kiwi-run-id): only url + credentials needed.
# Push-only mode (--kiwi-create-run): also needs plan_id (and optionally build_id).
kiwi_tcms:
  enabled: false                   # Set true after Kiwi TCMS is configured
  url: "${TCMS_API_URL}"           # Required — set in .env
  # Credentials: TCMS_USERNAME, TCMS_PASSWORD must be set in .env
  plan_id: "${KIWI_PLAN_ID}"      # Optional — only for --kiwi-create-run
  build_id: "${KIWI_BUILD_ID}"    # Optional — only for --kiwi-create-run
  auto_create_run: false           # Set true to auto-create runs (needs plan_id)
  # status_ids:                    # Optional: override if your Kiwi uses different IDs
  #   PASSED: 4
  #   FAILED: 5
  #   BLOCKED: 6

# --- Grafana / Prometheus ---
metrics:
  enabled: true                  # Set true after Prometheus Pushgateway is ready
  pushgateway_url: "${PUSHGATEWAY_URL}"      # Optional — set in .env
  job_name: "E2E_Sphere_HSM"
  # run_id: Auto-generated per session (override with --run-id CLI flag)
  labels:
    environment: "staging"
    team: "security"

# --- Remote Logs (Loki) ---
# After each test, query Loki for logs from all VMs within the test's
# time range. Results are saved as .log files, zipped, and attached to Allure.
remote_logs:
  enabled: true                     # Set true after Loki is reachable
  loki_url: "${LOKI_URL}"           # Required — set in .env
  default_limit: 5000                 # Max log lines per query (Loki server limit -5000)
  timeout: 30                       # HTTP request timeout (seconds)
  time_buffer: 60                   # Extra seconds ± to cover clock skew between VMs
  queries:
    - label: "sphere_hsm_admin"
      query: '{job="sphere_hsm_admin"}'
    - label: "sphere_hsm_admin_applog"
      query: '{job="sphere_hsm_admin_applog"}'
    - label: "sphere_hsm_proxy"
      query: '{job="sphere_hsm_proxy"}'
      limit: 50000                    # Paginated in 5000-line batches (proxy very verbose)

# --- Remote Agents ---
# Trigger automation on remote Windows VMs via HTTP.
# Each agent must be running on its target VM (interactive desktop session).
# Supports multiple VMs — access by name: remote["proxy_vm"].run_script(...)
# See docs/remote_agent_guide.md for setup instructions.
remote_agents:
  enabled: false                       # Set true after agents are running
  default_port: 5050                   # Default port if not specified per agent
  default_timeout: 120                 # Default command timeout in seconds
  agents:
    proxy_vm:
      host: "${REMOTE_AGENT_PROXY_HOST}"   # e.g. 10.66.1.10 — set in .env
      port: 5050
      auth_token: ""
      description: "HSM Proxy VM"
    # key_server_vm:
    #   host: "${REMOTE_AGENT_KEYS_HOST}"  # e.g. 10.66.1.20
    #   port: 5050
    #   auth_token: ""
    #   description: "Key Server VM"

# --- Jenkins ---
jenkins:
  workspace_windows: "C:\\Jenkins\\workspace\\hsm-tests"
  workspace_linux: "/var/lib/jenkins/workspace/hsm-tests"
  artifacts_dir: "evidence"
