server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: workspace_web
    static_configs:
      - targets:
          - localhost
        labels:
          job: workspace_web
          __path__: /var/log/workspace-web/*.log

  - job_name: workspace_api
    static_configs:
      - targets:
          - localhost
        labels:
          job: workspace_api
          __path__: /var/log/workspace-api/*.log
